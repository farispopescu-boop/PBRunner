name: pbrunner
description: PBRunner — Analiza biomecanica sprint cu IAAF Elite Template
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP + API
  http: ^1.2.1
  dio: ^5.4.3

  # Video
  video_player: ^2.8.3
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.67.0

  # Storage local
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  path: ^1.9.0

  # Utilitati
  uuid: ^4.3.3
  intl: ^0.19.0
  open_file: ^3.3.2
  share_plus: ^9.0.0
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/SpaceGrotesk-Regular.ttf
        - asset: assets/fonts/SpaceGrotesk-Bold.ttf
          weight: 700